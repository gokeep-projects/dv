name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            install: musl-tools
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux' && matrix.install
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.install }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release/plugins
          cp target/${{ matrix.target }}/release/devtool release/
          cp target/${{ matrix.target }}/release/libdevtool_plugin_*.so release/plugins/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libdevtool_plugin_*.dylib release/plugins/ 2>/dev/null || true

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir release\plugins
          copy target\${{ matrix.target }}\release\devtool.exe release\
          copy target\${{ matrix.target }}\release\devtool_plugin_*.dll release\plugins\

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd release
          tar -czf ../devtool-${{ github.ref_name }}-${{ matrix.target }}.tar.gz devtool plugins/

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd release
          7z a -tzip ../devtool-${{ github.ref_name }}-${{ matrix.target }}.zip devtool.exe plugins/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devtool-${{ matrix.target }}
          path: devtool-*.tar.gz
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          fail_on_unmatched_files: false
          generate_release_notes: true
