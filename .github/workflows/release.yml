name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 musl (static)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
            artifact: dv-linux-x86_64
            install: musl-tools
          # Linux aarch64 musl (static)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            artifact: dv-linux-aarch64
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            artifact: dv-macos-x86_64
          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            artifact: dv-macos-aarch64
          # Windows x86_64 (static)
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            use_cross: true
            artifact: dv-windows-x86_64
            install: p7zip-full

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install dependencies
        if: matrix.install
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.install }}

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} --bin dv

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --bin dv

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          BIN_NAME="dv"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BIN_NAME="dv.exe"
          fi
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" dist/
          cd dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a -tzip "../${{ matrix.artifact }}.zip" *
          else
            tar czf "../${{ matrix.artifact }}.tar.gz" *
          fi
          cd ..
          ls -lh ${{ matrix.artifact }}.*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: warn

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          {
            echo "## What's Changed"
            echo ""
            if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" --reverse
            else
              git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)"
            fi
            echo ""
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x86_64 | \`dv-linux-x86_64.tar.gz\` |"
            echo "| Linux | aarch64 | \`dv-linux-aarch64.tar.gz\` |"
            echo "| macOS | x86_64 | \`dv-macos-x86_64.tar.gz\` |"
            echo "| macOS | aarch64 | \`dv-macos-aarch64.tar.gz\` |"
            echo "| Windows | x86_64 | \`dv-windows-x86_64.zip\` |"
          } > CHANGELOG.md

          CHANGELOG=$(cat CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

  release:
    name: Create GitHub Release
    needs: [build, changelog]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release_files
          find artifacts -name "*.tar.gz" -exec cp {} release_files/ \;
          find artifacts -name "*.zip" -exec cp {} release_files/ \;
          ls -lh release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          body: ${{ needs.changelog.outputs.changelog }}
          fail_on_unmatched_files: false
          generate_release_notes: false
          draft: false
          prerelease: false
